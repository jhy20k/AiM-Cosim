# HBM-PIM Stage 5B: mode1 timing-only smoke
# Future work: HBM-PIM configs are experimental scaffolding and are not part of
# the validated GDDR6-AiM RTL flow.
# Uses the existing AiMDRAMSystem + AiMRTL controller spine with a new HBM2_PIM DRAM impl.

Frontend:
  impl: HBMPIMTrace
  clock_ratio: 1

  Translation:
    impl: NoTranslation
    max_addr: 2147483648

MemorySystem:
  impl: AiMDRAM
  clock_ratio: 1

  DRAM:
    impl: HBM2_PIM
    org:
      preset: HBM2_2Gb
    timing:
      preset: HBM2_2Gbps

  Controller:
    impl: AiMRTL
    clock_ratio: 1
    architecture:
      kind: hbm_pim
    verilator:
      enabled: false
      result_log: ""
    Scheduler:
      impl: FRFCFS
    RefreshManager:
      impl: AllBank
    plugins:

  AddrMapper:
    impl: RoBaRaCoCh

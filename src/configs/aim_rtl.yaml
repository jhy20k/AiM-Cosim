# AiM-Cosim Mode 2: Timing + Functional Co-verification
# Controller impl: AiMRTL (AiMDRAMControllerRTL with Verilator hook)
# Verilator/Memory Manager 활성

Frontend:
  impl: AiMTrace
  clock_ratio: 1

  Translation:
    impl: NoTranslation
    max_addr: 2147483648

MemorySystem:
  impl: AiMDRAM
  clock_ratio: 1

  DRAM:
    impl: GDDR6
    org:
      preset: GDDR6_AiM_org
    timing:
      preset: GDDR6_AiM_timing

  Controller:
    impl: AiMRTL
    clock_ratio: 1
    memory_manager:
      num_banks: 16
      max_rows: 16384
      tiles_per_row: 128
      init_mode: "random"
      init_seed: 42
      data_file: ""
    verilator:
      enabled: true
      result_log: "tests/result/rtl_results.csv"
      vcd_trace: false
      vcd_file: "aim_rtl.vcd"
      logging:
        buffer_size: 65536
        result_level: full
        timing_level: off
    Scheduler:
      impl: FRFCFS
    RefreshManager:
      impl: AllBank
    plugins:

  AddrMapper:
    impl: RoBaRaCoCh

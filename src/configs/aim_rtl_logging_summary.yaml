# Stage 2 logger-policy validation config
# Uses normal RTL timing, but writes only "interesting" timing events:
#   - diverged rows
#   - deferred-consumer rows
#   - fallback flush rows

Frontend:
  impl: AiMTrace
  clock_ratio: 1

  Translation:
    impl: NoTranslation
    max_addr: 2147483648

MemorySystem:
  impl: AiMDRAM
  clock_ratio: 1

  DRAM:
    impl: GDDR6
    org:
      preset: GDDR6_AiM_org
    timing:
      preset: GDDR6_AiM_timing

  Controller:
    impl: AiMRTL
    clock_ratio: 1
    memory_manager:
      num_banks: 16
      max_rows: 16384
      tiles_per_row: 128
      init_mode: "random"
      init_seed: 42
      data_file: ""
    verilator:
      enabled: true
      result_log: "tests/result/rtl_results.csv"
      vcd_trace: false
      vcd_file: "aim_rtl.vcd"
      logging:
        buffer_size: 4096
        result_level: off
        timing_level: summary
        schema_version: 1
    Scheduler:
      impl: FRFCFS
    RefreshManager:
      impl: AllBank
    plugins:

  AddrMapper:
    impl: RoBaRaCoCh

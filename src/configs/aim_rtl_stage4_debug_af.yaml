# Stage 4 positive-defer validation config
# Identical to aim_rtl.yaml except the reported AF16 rtl_cycles are clamped
# upward for debug/validation. Baseline runs should continue to use aim_rtl.yaml.

Frontend:
  impl: AiMTrace
  clock_ratio: 1

  Translation:
    impl: NoTranslation
    max_addr: 2147483648

MemorySystem:
  impl: AiMDRAM
  clock_ratio: 1

  DRAM:
    impl: GDDR6
    org:
      preset: GDDR6_AiM_org
    timing:
      preset: GDDR6_AiM_timing

  Controller:
    impl: AiMRTL
    clock_ratio: 1
    memory_manager:
      num_banks: 16
      max_rows: 16384
      tiles_per_row: 128
      init_mode: "random"
      init_seed: 42
      data_file: ""
    verilator:
      enabled: true
      result_log: "tests/result/rtl_results.csv"
      vcd_trace: false
      vcd_file: "aim_rtl.vcd"
      scoreboard_gating: true
      rtl_cycle_override:
        AF16: 40
    Scheduler:
      impl: FRFCFS
    RefreshManager:
      impl: AllBank
    plugins:

  AddrMapper:
    impl: RoBaRaCoCh
